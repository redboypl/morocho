<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Mundial 2026 — Fase de Grupos | Apuestas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="morocho.css" />
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     PANTALLA DE AUTENTICACIÓN
══════════════════════════════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <h2>Mundial 2026 🏆</h2>
    <p class="subtitle">Registra y guarda tus apuestas</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- Login -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn-primary" id="btnLogin" onclick="login()">Entrar</button>
    </div>

    <!-- Register -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Nombre de usuario</label>
        <input type="text" id="regUsername" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña (mín. 8 caracteres)</label>
        <input type="password" id="regPassword" placeholder="••••••••" />
      </div>
      <button class="btn-primary" id="btnRegister" onclick="register()">Crear cuenta</button>
    </div>

    <p class="auth-error" id="authError"></p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     PANTALLA PRINCIPAL (después de login)
══════════════════════════════════════════════════════════ -->
<div id="appScreen">
  <header>
    <div class="header-left">
      <h1>Copa del Mundo 2026 — Fase de Grupos</h1>
      <p>Haz clic en un tipo de apuesta para registrarla · Hora Venezuela (VET)</p>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="controls">
    <label>Grupo</label>
    <select id="filterGroup">
      <option value="">Todos</option>
      <option>A</option><option>B</option><option>C</option><option>D</option>
      <option>E</option><option>F</option><option>G</option><option>H</option>
      <option>I</option><option>J</option><option>K</option><option>L</option>
    </select>
    <label>Fecha</label>
    <select id="filterDate"><option value="">Todas</option></select>
    <input type="text" id="searchTeam" placeholder="Buscar selección..." />
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Gr.</th>
          <th>Partido</th>
          <th>Hora VET</th>
          <th>Sede</th>
          <th>Tipos de apuesta</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="no-results" id="noResults">No se encontraron partidos con ese filtro.</div>
  </div>
  <p class="footer-bar" id="countLabel"></p>
</div>

<!-- ══════════════════════════════════════════════════════════
     MODAL DE APUESTA
══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Registrar apuesta</h3>
    <p class="modal-sub" id="modalSub"></p>
    <div class="form-group">
      <label>Monto apostado (Bs / USD / lo que uses)</label>
      <input type="number" id="modalAmount" placeholder="ej: 10" min="0" step="0.01" />
    </div>
    <div class="form-group">
      <label>Tu predicción</label>
      <input type="text" id="modalPrediction" placeholder="ej: 2-1, Más de 2.5, Local..." />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-delete" id="btnDeleteBet" onclick="deleteBet()" style="display:none">Eliminar</button>
      <button class="btn-save" onclick="saveBet()">Guardar</button>
    </div>
    <p class="auth-error" id="modalError"></p>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

// ESTADO
// ══════════════════════════════════════════════════════════════
let token    = localStorage.getItem('token')    || null;
let user     = JSON.parse(localStorage.getItem('user') || 'null');

// Modal state
let modalMatch   = null;
let modalBetType = null;
let modalBetId   = null;

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
(function init() {
  if (token && user) {
    showApp();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
  }
})();

// ══════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b, i) =>
    b.classList.toggle('active', (i === 0) === (tab === 'login'))
  );
  document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('authError').textContent = '';
}

async function login() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  setAuthError('');
  if (!email || !password) return setAuthError('Completa todos los campos');

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Entrando...';

  try {
    const res  = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

    token = data.token;
    user  = data.user;
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(user));
    showApp();
  } catch (err) {
    setAuthError(err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function register() {
  const username = document.getElementById('regUsername').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  setAuthError('');
  if (!username || !email || !password) return setAuthError('Completa todos los campos');
  if (password.length < 8) return setAuthError('La contraseña debe tener al menos 8 caracteres');

  const btn = document.getElementById('btnRegister');
  btn.disabled = true; btn.textContent = 'Creando cuenta...';

  try {
    const res  = await fetch(`${API_URL}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al registrarse');

    token = data.token;
    user  = data.user;
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(user));
    showApp();
  } catch (err) {
    setAuthError(err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Crear cuenta';
  }
}

function logout() {
  token = null; user = null; savedBets = {};
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  document.getElementById('appScreen').style.display  = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

function setAuthError(msg) {
  document.getElementById('authError').textContent = msg;
}

// ══════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════
async function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display  = 'block';
  document.getElementById('userBadge').textContent    = `👤 ${user.username}`;

  // Populate date filter
  const dates      = [...new Set(matches.map(m => m.date))];
  const dateSelect = document.getElementById('filterDate');
  dateSelect.innerHTML = '<option value="">Todas</option>';
  dates.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    dateSelect.appendChild(o);
  });

  document.getElementById('filterGroup').addEventListener('change', render);
  document.getElementById('filterDate').addEventListener('change', render);
  document.getElementById('searchTeam').addEventListener('input', render);

  await loadBets();
  render();
}

async function loadBets() {
  try {
    const res  = await fetch(`${API_URL}/api/bets`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    savedBets = {};
    data.forEach(b => {
      savedBets[`${b.match_id}|${b.bet_type}`] = { id: b.id, amount: b.amount, prediction: b.prediction };
    });
  } catch (err) {
    console.error('Error cargando apuestas:', err);
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function matchId(m) {
  return `${m.g}_${m.home}_${m.away}_${m.date}`.replace(/\s+/g, '').replace(/[^a-zA-Z0-9_áéíóúÁÉÍÓÚñÑ]/g, '');
}

function buildTags(m) {
  const mid = matchId(m);
  return BETS.map(b => {
    const key     = `${mid}|${b.label}`;
    const saved   = savedBets[key];
    const classes = `tag ${b.cls}${saved ? ' saved' : ''}`;
    const title   = saved
      ? `Apuesta guardada: ${saved.prediction || '—'} · ${saved.amount ? '$'+saved.amount : 'sin monto'}`
      : 'Clic para registrar apuesta';
    return `<span class="${classes}" title="${title}" onclick="openModal(${JSON.stringify(m).replace(/"/g,"'")}, '${b.label}')">${b.label}</span>`;
  }).join('');
}

function render() {
  const gFilter = document.getElementById('filterGroup').value;
  const dFilter = document.getElementById('filterDate').value;
  const search  = document.getElementById('searchTeam').value.toLowerCase().trim();

  const filtered = matches.filter(m => {
    if (gFilter && m.g !== gFilter) return false;
    if (dFilter && m.date !== dFilter) return false;
    if (search && !m.home.toLowerCase().includes(search) && !m.away.toLowerCase().includes(search)) return false;
    return true;
  });

  const tbody   = document.getElementById('tableBody');
  const noRes   = document.getElementById('noResults');
  const countEl = document.getElementById('countLabel');

  if (!filtered.length) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    countEl.textContent = '';
    return;
  }

  noRes.style.display = 'none';
  countEl.textContent = `${filtered.length} partido${filtered.length !== 1 ? 's' : ''} mostrado${filtered.length !== 1 ? 's' : ''}`;

  tbody.innerHTML = filtered.map(m => `
    <tr>
      <td data-label="Gr."><span class="grp">${m.g}</span></td>
      <td data-label="Partido" class="match-name">${m.home} <span class="vs">vs</span> ${m.away}</td>
      <td data-label="Hora VET" class="time-cell">${m.time}<br><span class="date-sub">${m.date}</span></td>
      <td data-label="Sede" class="venue">${m.venue}</td>
      <td data-label="Apuestas"><div class="tags">${buildTags(m)}</div></td>
    </tr>
  `).join('');
}

// ══════════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════════
function openModal(m, betType) {
  modalMatch   = m;
  modalBetType = betType;

  const mid     = matchId(m);
  const key     = `${mid}|${betType}`;
  const existing = savedBets[key];
  modalBetId    = existing ? existing.id : null;

  document.getElementById('modalTitle').textContent = `${betType} — ${m.home} vs ${m.away}`;
  document.getElementById('modalSub').textContent   = `${m.date} · ${m.time} VET · ${m.venue}`;
  document.getElementById('modalAmount').value      = existing?.amount || '';
  document.getElementById('modalPrediction').value  = existing?.prediction || '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('btnDeleteBet').style.display = existing ? 'block' : 'none';

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalMatch = modalBetType = modalBetId = null;
}

async function saveBet() {
  const amount     = document.getElementById('modalAmount').value;
  const prediction = document.getElementById('modalPrediction').value.trim();
  document.getElementById('modalError').textContent = '';

  const mid = matchId(modalMatch);
  try {
    const res = await fetch(`${API_URL}/api/bets`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({
        match_id:   mid,
        home:       modalMatch.home,
        away:       modalMatch.away,
        match_date: modalMatch.date,
        match_time: modalMatch.time,
        venue:      modalMatch.venue,
        grupo:      modalMatch.g,
        bet_type:   modalBetType,
        amount:     amount ? parseFloat(amount) : null,
        prediction: prediction || null,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error al guardar');

    savedBets[`${mid}|${modalBetType}`] = { id: data.id, amount: data.amount, prediction: data.prediction };
    closeModal();
    render();
    showToast('✓ Apuesta guardada');
  } catch (err) {
    document.getElementById('modalError').textContent = err.message;
  }
}

async function deleteBet() {
  if (!modalBetId) return;
  try {
    const res = await fetch(`${API_URL}/api/bets/${modalBetId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` },
    });
    if (!res.ok) throw new Error('Error al eliminar');

    const mid = matchId(modalMatch);
    delete savedBets[`${mid}|${modalBetType}`];
    closeModal();
    render();
    showToast('Apuesta eliminada');
  } catch (err) {
    document.getElementById('modalError').textContent = err.message;
  }
}

// Cerrar modal al hacer clic fuera
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
